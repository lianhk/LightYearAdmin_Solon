<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心</title>
<link href="/static/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/lib/mdi/css/materialdesignicons.min.css" rel="stylesheet">
<link href="/static/lib/layer/theme/default/layer.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:15px}

.profile-layout{display:flex;gap:15px}
.profile-side{width:280px;flex-shrink:0}
.profile-main{flex:1;min-width:0}

.section{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:15px}
.section-header{padding:12px 18px;border-bottom:1px solid #f0f0f0;font-size:14px;font-weight:500;color:#333}
.section-body{padding:18px}

/* 用户信息卡片 */
.user-card{text-align:center}
.user-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#4facfe,#00f2fe);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:600;margin-bottom:10px}
.user-card .uname{font-size:18px;font-weight:600;color:#333}
.user-card .urole{font-size:13px;color:#888;margin-top:4px}
.user-card .uinfo{padding:0;margin:15px 0 0;list-style:none;text-align:left}
.user-card .uinfo li{padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;color:#555;display:flex}
.user-card .uinfo li .info-label{color:#888;min-width:70px}

/* 表单 */
.form-group label{font-size:13px;color:#555;font-weight:500;margin-bottom:4px}
.form-control{height:38px;border-radius:4px;font-size:13px}
.btn{border-radius:4px;font-size:13px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}

/* 标签页 */
.nav-tabs{border-bottom:1px solid #e8e8e8;padding:0 18px;background:#fafafa;border-radius:6px 6px 0 0}
.nav-tabs .nav-link{border:none;font-size:13px;color:#888;padding:10px 16px;cursor:pointer}
.nav-tabs .nav-link.active{color:#4facfe;border-bottom:2px solid #4facfe;background:none}
.tab-content{padding:18px}

@media(max-width:768px){
  .profile-layout{flex-direction:column}
  .profile-side{width:100%}
}
</style>
</head>
<body>

<div class="profile-layout">
  <!-- 左侧信息卡片 -->
  <div class="profile-side">
    <div class="section">
      <div class="section-body">
        <div class="user-card">
          <div class="user-avatar">${strutil.subString(user.nickName!=null?user.nickName:user.userName,0,1)}</div>
          <div class="uname">${user.nickName!=null?user.nickName:user.userName}</div>
          <div class="urole">${user.deptName!''}</div>
          <ul class="uinfo">
            <li><span class="info-label">用户名</span><span>${user.userName}</span></li>
            <li><span class="info-label">手机号</span><span>${user.phoneNumber!'-'}</span></li>
            <li><span class="info-label">邮箱</span><span>${user.email!'-'}</span></li>
            <li><span class="info-label">创建时间</span><span>${user.createTime!'-'}</span></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧表单区 -->
  <div class="profile-main">
    <div class="section">
      <!-- 标签导航 -->
      <ul class="nav nav-tabs" id="profileTabs">
        <li class="nav-item"><a class="nav-link active" data-toggle="tab" href="#tabInfo">基本信息</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#tabPwd">修改密码</a></li>
      </ul>

      <div class="tab-content">
        <!-- 基本信息 -->
        <div class="tab-pane active" id="tabInfo">
          <form id="infoForm" method="post" action="/system/user/profile">
            <input type="hidden" name="userId" value="${user.userId}">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>用户名</label>
                  <input type="text" class="form-control" value="${user.userName}" readonly style="background:#f9f9f9">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>昵称</label>
                  <input type="text" class="form-control" name="nickName" value="${user.nickName!''}" placeholder="请输入昵称">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>手机号</label>
                  <input type="text" class="form-control" name="phoneNumber" value="${user.phoneNumber!''}" placeholder="请输入手机号">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>邮箱</label>
                  <input type="text" class="form-control" name="email" value="${user.email!''}" placeholder="请输入邮箱">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>性别</label>
                  <select class="form-control" name="sex">
                    <option value="0" ${user.sex=='0'?'selected':''}>男</option>
                    <option value="1" ${user.sex=='1'?'selected':''}>女</option>
                    <option value="2" ${user.sex=='2'?'selected':''}>未知</option>
                  </select>
                </div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
          </form>
        </div>

        <!-- 修改密码 -->
        <div class="tab-pane" id="tabPwd">
          <form id="pwdForm" method="post" action="/system/user/profile/updatePwd" style="max-width:480px">
            <div class="form-group">
              <label>旧密码</label>
              <input type="password" class="form-control" name="oldPassword" placeholder="请输入旧密码" required>
            </div>
            <div class="form-group">
              <label>新密码</label>
              <input type="password" class="form-control" name="newPassword" id="newPassword" placeholder="请输入新密码" required minlength="6">
            </div>
            <div class="form-group">
              <label>确认密码</label>
              <input type="password" class="form-control" name="confirmPassword" placeholder="请再次输入新密码" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/lib/jquery/jquery.min.js"></script>
<script src="/static/lib/bootstrap/js/bootstrap.min.js"></script>
<script src="/static/lib/layer/layer.js"></script>
<script>
$(document).ready(function(){
  // 标签切换
  $('.nav-link[data-toggle="tab"]').on('click', function(e){
    e.preventDefault();
    var target = $(this).attr('href');
    $('.nav-link[data-toggle="tab"]').removeClass('active');
    $(this).addClass('active');
    $('.tab-pane').removeClass('active');
    $(target).addClass('active');
  });

  // 基本信息提交
  $('#infoForm').on('submit', function(e){
    e.preventDefault();
    $.post($(this).attr('action'), $(this).serialize(), function(res){
      if(res.code === 0){
        layer.msg('修改成功', {icon:1});
        setTimeout(function(){ window.location.reload(); }, 1000);
      }else{
        layer.msg(res.msg || '修改失败', {icon:2});
      }
    });
  });

  // 修改密码提交
  $('#pwdForm').on('submit', function(e){
    e.preventDefault();
    var newPwd = $('#newPassword').val();
    var confirmPwd = $('input[name="confirmPassword"]').val();
    if(newPwd.length < 6){
      layer.msg('新密码长度不能少于6位', {icon:2});
      return;
    }
    if(newPwd !== confirmPwd){
      layer.msg('两次输入的密码不一致', {icon:2});
      return;
    }
    $.post($(this).attr('action'), $(this).serialize(), function(res){
      if(res.code === 0){
        layer.msg('密码修改成功，请重新登录', {icon:1});
        setTimeout(function(){
          window.parent.location.href = '/login';
        }, 1500);
      }else{
        layer.msg(res.msg || '密码修改失败', {icon:2});
      }
    });
  });
});
</script>

</body>
</html>
