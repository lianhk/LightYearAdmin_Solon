<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/5.9.55/css/materialdesignicons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: "Microsoft YaHei", sans-serif; padding: 20px; }
        .welcome-header { text-align: center; padding: 30px 0; }
        .welcome-header h1 { font-size: 26px; color: #333; margin-bottom: 8px; }
        .welcome-header p { font-size: 14px; color: #999; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            flex: 1;
            min-width: 200px;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin-right: 15px;
        }
        .stat-card .icon.blue { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-card .icon.green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .stat-card .icon.orange { background: linear-gradient(135deg, #fa709a, #fee140); }
        .stat-card .icon.purple { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #333; }
        .stat-card .label { font-size: 13px; color: #999; }

        .section { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .section-header { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 15px; color: #333; }
        .section-body { padding: 20px; }

        .tech-list { display: flex; flex-wrap: wrap; gap: 12px; }
        .tech-tag {
            padding: 8px 16px;
            background: #f0f4ff;
            border-radius: 20px;
            font-size: 13px;
            color: #4facfe;
            font-weight: 500;
        }

        .notice-item { padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .notice-item:last-child { border-bottom: none; }
        .notice-item .title { font-size: 14px; color: #333; }
        .notice-item .time { font-size: 12px; color: #bbb; margin-top: 4px; }
        .notice-item .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; }
        .notice-item .dot.notice { background: #4facfe; }
        .notice-item .dot.announce { background: #fa709a; }
    </style>
</head>
<body>
    <div class="welcome-header">
        <h1>欢迎使用 CMS 管理系统</h1>
        <p>Solon 3.10.7 + BeetlSQL + Light Year Admin Iframe v4</p>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="icon blue"><span class="mdi mdi-account-group"></span></div>
            <div>
                <div class="num">5</div>
                <div class="label">系统用户</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="icon green"><span class="mdi mdi-menu"></span></div>
            <div>
                <div class="num">24</div>
                <div class="label">菜单项</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="icon orange"><span class="mdi mdi-folder"></span></div>
            <div>
                <div class="num">6</div>
                <div class="label">部门</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="icon purple"><span class="mdi mdi-book-open"></span></div>
            <div>
                <div class="num">5</div>
                <div class="label">字典类型</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="section">
                <div class="section-header"><span class="mdi mdi-information-outline"></span> 技术栈</div>
                <div class="section-body">
                    <div class="tech-list">
                        <span class="tech-tag">Java 8+</span>
                        <span class="tech-tag">Solon 3.10.7</span>
                        <span class="tech-tag">BeetlSQL 3.x</span>
                        <span class="tech-tag">Beetl 3.x</span>
                        <span class="tech-tag">MySQL 5.7+</span>
                        <span class="tech-tag">JWT 认证</span>
                        <span class="tech-tag">Bootstrap 4.5</span>
                        <span class="tech-tag">jQuery</span>
                        <span class="tech-tag">MDI Icons</span>
                        <span class="tech-tag">RESTful API</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="section">
                <div class="section-header"><span class="mdi mdi-bell-outline"></span> 最新公告</div>
                <div class="section-body">
                    <div class="notice-item">
                        <span class="dot announce"></span>
                        <div class="title" style="display:inline">关于升级系统框架的通知</div>
                        <div class="time">2024-01-01</div>
                    </div>
                    <div class="notice-item">
                        <span class="dot notice"></span>
                        <div class="title" style="display:inline">CMS企业网站管理系统正式上线</div>
                        <div class="time">2024-01-01</div>
                    </div>
                    <div class="notice-item">
                        <span class="dot notice"></span>
                        <div class="title" style="display:inline">关于2024年春节放假安排的通知</div>
                        <div class="time">2024-01-01</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
