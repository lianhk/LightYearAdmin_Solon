<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>部门管理</title>
<link href="/static/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/lib/mdi/css/materialdesignicons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:15px}
.section{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:15px}
.section-header{padding:12px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.section-body{padding:15px}
.btn{border-radius:4px;font-size:13px;padding:7px 16px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.btn-info{background:#00d2ff;border-color:#00d2ff;color:#fff}.btn-warning{background:#fee140;border-color:#fee140;color:#333}.btn-danger{background:#fa709a;border-color:#fa709a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.table{margin:0}.table th{font-size:13px;color:#555;border-top:none;background:#fafafa}.table td{font-size:13px;vertical-align:middle}
.tree-indent{display:inline-block;width:18px}
</style>
</head>
<body>
<div class="section">
  <div class="section-header"><strong>部门管理</strong>
    <div><button class="btn btn-primary btn-sm" onclick="openAdd(0)"><span class="mdi mdi-plus"></span> 新增</button></div>
  </div>
  <div class="section-body">
    <table class="table table-hover"><thead><tr><th>部门名称</th><th>排序</th><th>负责人</th><th>电话</th><th>状态</th><th>创建时间</th><th width="160">操作</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<div class="modal fade" id="deptModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title" id="modalTitle">新增部门</h5><button class="close" data-dismiss="modal">&times;</button></div>
<div class="modal-body">
  <input type="hidden" id="editDeptId"><input type="hidden" id="editParentId">
  <div class="form-group"><label>上级部门</label><input class="form-control" id="parentName" readonly></div>
  <div class="form-group"><label>部门名称</label><input class="form-control" id="editDeptName"></div>
  <div class="form-group"><label>显示排序</label><input class="form-control" type="number" id="editOrderNum" value="0"></div>
  <div class="form-group"><label>负责人</label><input class="form-control" id="editLeader"></div>
  <div class="form-group"><label>电话</label><input class="form-control" id="editPhone"></div>
  <div class="form-group"><label>邮箱</label><input class="form-control" id="editEmail"></div>
  <div class="form-group"><label>状态</label><select class="form-control" id="editStatus"><option value="0">正常</option><option value="1">停用</option></select></div>
</div>
<div class="modal-footer"><button class="btn btn-secondary" data-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveDept()">保存</button></div>
</div></div></div>

<script src="/static/lib/jquery/jquery.min.js"></script>
<script src="/static/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
var token = parent.localStorage.getItem('token') || localStorage.getItem('token');
function H(){return {'Authorization':'Bearer '+token,'Content-Type':'application/json'}}
$(function(){loadData()});
function loadData(){
  $.ajax({url:'/system/dept/list',type:'GET',headers:{'Authorization':'Bearer '+token},success:function(res){
    var t='';function render(depts,level){
      if(!depts)return;depts.forEach(function(d){
        var indent='';for(var i=0;i<level;i++)indent+='<span class="tree-indent"></span>';
        t+='<tr><td>'+indent+(level>0?'&boxur; ':'')+d.deptName+'</td><td>'+d.orderNum+'</td><td>'+(d.leader||'')+'</td>';
        t+='<td>'+(d.phone||'')+'</td><td><span class="badge '+(d.status=='0'?'badge-success':'badge-danger')+'">'+(d.status=='0'?'正常':'停用')+'</span></td>';
        t+='<td>'+(d.createTime||'')+'</td>';
        t+='<td><button class="btn btn-sm btn-info" onclick="openAdd('+d.deptId+')"><span class="mdi mdi-plus"></span></button> ';
        t+='<button class="btn btn-sm btn-warning" onclick="openEdit('+d.deptId+')"><span class="mdi mdi-pencil"></span></button> ';
        t+='<button class="btn btn-sm btn-danger" onclick="deleteDept('+d.deptId+')"><span class="mdi mdi-delete"></span></button></td></tr>';
        if(d.children)render(d.children,level+1);
      });
    }
    render(res.data,0);$('table tbody').html(t);
  }});
}
function openAdd(parentId){
  $('#editDeptId').val('');$('#editParentId').val(parentId);$('#editDeptName,#editLeader,#editPhone,#editEmail').val('');
  $('#editOrderNum').val('0');$('#editStatus').val('0');$('#parentName').val(parentId?'上级部门（ID:'+parentId+'）':'根部门');
  $('#modalTitle').text('新增部门');$('#deptModal').modal('show');
}
function openEdit(id){
  $.ajax({url:'/system/dept/'+id,type:'GET',headers:{'Authorization':'Bearer '+token},success:function(res){
    var d=res.data;$('#editDeptId').val(d.deptId);$('#editParentId').val(d.parentId);
    $('#editDeptName').val(d.deptName);$('#editOrderNum').val(d.orderNum);$('#editLeader').val(d.leader);
    $('#editPhone').val(d.phone);$('#editEmail').val(d.email);$('#editStatus').val(d.status);
    $('#parentName').val('上级部门（ID:'+(d.parentId||0)+'）');$('#modalTitle').text('编辑部门');$('#deptModal').modal('show');
  }});
}
function saveDept(){
  var d={deptId:$('#editDeptId').val(),parentId:parseInt($('#editParentId').val())||0,
    deptName:$('#editDeptName').val(),orderNum:parseInt($('#editOrderNum').val())||0,
    leader:$('#editLeader').val(),phone:$('#editPhone').val(),email:$('#editEmail').val(),status:$('#editStatus').val()};
  $.ajax({url:'/system/dept',type:d.deptId?'PUT':'POST',contentType:'application/json',headers:H(),data:JSON.stringify(d),
    success:function(res){if(res.code===200){$('#deptModal').modal('hide');loadData()}else alert(res.msg)}});
}
function deleteDept(id){if(!confirm('确认删除？'))return;
  $.ajax({url:'/system/dept/'+id,type:'DELETE',headers:{'Authorization':'Bearer '+token},success:function(res){if(res.code===200)loadData()}});
}
</script>
</body>
</html>
