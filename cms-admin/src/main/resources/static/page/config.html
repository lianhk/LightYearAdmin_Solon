<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>参数设置</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/5.9.55/css/materialdesignicons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:15px}
.section{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:15px}
.section-header{padding:12px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.section-body{padding:15px}
.btn{border-radius:4px;font-size:13px;padding:7px 16px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.btn-warning{background:#fee140;border-color:#fee140;color:#333}.btn-danger{background:#fa709a;border-color:#fa709a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.table{margin:0}.table th{font-size:13px;color:#555;border-top:none;background:#fafafa}.table td{font-size:13px;vertical-align:middle}
.badge{font-size:12px;padding:4px 10px;border-radius:12px}
.form-inline{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.form-control{height:38px;border-radius:4px;font-size:13px}
</style>
</head>
<body>
<div class="section"><div class="section-header"><strong>参数设置</strong>
  <div><button class="btn btn-primary btn-sm" onclick="openAdd()"><span class="mdi mdi-plus"></span> 新增</button></div>
</div>
<div class="section-body">
  <div class="form-inline">
    <input class="form-control" id="searchConfigName" placeholder="参数名称" style="width:150px">
    <input class="form-control" id="searchConfigKey" placeholder="参数键名" style="width:150px">
    <select class="form-control" id="searchConfigType" style="width:120px"><option value="">类型</option><option value="Y">系统内置</option><option value="N">用户自定义</option></select>
    <button class="btn btn-primary" onclick="search()"><span class="mdi mdi-magnify"></span></button>
  </div>
  <hr>
  <table class="table table-hover"><thead><tr><th>编号</th><th>参数名称</th><th>参数键名</th><th>参数键值</th><th>系统内置</th><th>创建时间</th><th width="120">操作</th></tr></thead><tbody></tbody></table>
</div></div>

<div class="modal fade" id="configModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title" id="modalTitle">新增参数</h5><button class="close" data-dismiss="modal">&times;</button></div>
<div class="modal-body">
  <input type="hidden" id="editConfigId"><div class="form-group"><label>参数名称</label><input class="form-control" id="editConfigName"></div>
  <div class="form-group"><label>参数键名</label><input class="form-control" id="editConfigKey"></div>
  <div class="form-group"><label>参数键值</label><input class="form-control" id="editConfigValue"></div>
  <div class="form-group"><label>系统内置</label><select class="form-control" id="editConfigType"><option value="Y">是</option><option value="N">否</option></select></div>
  <div class="form-group"><label>备注</label><textarea class="form-control" id="editRemark" rows="2"></textarea></div>
</div>
<div class="modal-footer"><button class="btn btn-secondary" data-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveConfig()">保存</button></div>
</div></div></div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script>
var token = parent.localStorage.getItem('token') || localStorage.getItem('token');
function H(){return {'Authorization':'Bearer '+token,'Content-Type':'application/json'}}
$(function(){loadData()});function search(){loadData()}
function loadData(){
  $.ajax({url:'/system/config/list',type:'GET',headers:{'Authorization':'Bearer '+token},
    data:{configName:$('#searchConfigName').val(),configKey:$('#searchConfigKey').val(),configType:$('#searchConfigType').val()},
    success:function(res){
      var t='';(res.rows||[]).forEach(function(c){
        t+='<tr><td>'+c.configId+'</td><td>'+c.configName+'</td><td>'+c.configKey+'</td><td>'+c.configValue+'</td>';
        t+='<td><span class="badge '+(c.configType=='Y'?'badge-info':'badge-secondary')+'">'+(c.configType=='Y'?'是':'否')+'</span></td>';
        t+='<td>'+(c.createTime||'')+'</td>';
        t+='<td><button class="btn btn-sm btn-warning" onclick="openEdit('+c.configId+')"><span class="mdi mdi-pencil"></span></button> ';
        t+='<button class="btn btn-sm btn-danger" onclick="deleteConfig('+c.configId+')"><span class="mdi mdi-delete"></span></button></td></tr>';
      });$('table tbody').html(t);
    }
  });
}
function openAdd(){$('#editConfigId').val('');$('#editConfigName,#editConfigKey,#editConfigValue').val('');$('#editConfigType').val('N');
  $('#modalTitle').text('新增参数');$('#configModal').modal('show')}
function openEdit(id){
  $.ajax({url:'/system/config/'+id,type:'GET',headers:{'Authorization':'Bearer '+token},success:function(res){
    var c=res.data;$('#editConfigId').val(c.configId);$('#editConfigName').val(c.configName);
    $('#editConfigKey').val(c.configKey);$('#editConfigValue').val(c.configValue);$('#editConfigType').val(c.configType);
    $('#editRemark').val(c.remark);$('#modalTitle').text('编辑参数');$('#configModal').modal('show');
  }});
}
function saveConfig(){
  var d={configId:$('#editConfigId').val(),configName:$('#editConfigName').val(),configKey:$('#editConfigKey').val(),
    configValue:$('#editConfigValue').val(),configType:$('#editConfigType').val(),remark:$('#editRemark').val()};
  $.ajax({url:'/system/config',type:d.configId?'PUT':'POST',contentType:'application/json',headers:H(),data:JSON.stringify(d),
    success:function(res){if(res.code===200){$('#configModal').modal('hide');loadData()}else alert(res.msg)}});
}
function deleteConfig(id){if(!confirm('确认删除？'))return;
  $.ajax({url:'/system/config/'+id,type:'DELETE',headers:{'Authorization':'Bearer '+token},success:function(res){if(res.code===200)loadData()}});
}
</script>
</body>
</html>
