<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/5.9.55/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-table/1.18.3/bootstrap-table.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: "Microsoft YaHei", sans-serif; padding: 0; }

        .page-container { padding: 15px; }
        .search-bar {
            background: #fff;
            padding: 18px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .search-bar .form-inline { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .search-bar .form-inline input { height: 38px; border-radius: 4px; border: 1px solid #ddd; padding: 0 12px; font-size: 13px; }
        .search-bar .form-inline select { height: 38px; border-radius: 4px; border: 1px solid #ddd; padding: 0 8px; font-size: 13px; }

        .btn { border-radius: 4px; font-size: 13px; padding: 7px 16px; }
        .btn-primary { background: #4facfe; border-color: #4facfe; }
        .btn-primary:hover { background: #3d9be8; border-color: #3d9be8; }
        .btn-success { background: #43e97b; border-color: #43e97b; color: #333; }
        .btn-warning { background: #fee140; border-color: #fee140; color: #333; }
        .btn-danger { background: #fa709a; border-color: #fa709a; }

        .toolbar { background: #fff; padding: 12px 18px; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

        .table-container { background: #fff; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 15px; }
        .table { margin: 0; }
        .table th { font-size: 13px; font-weight: 600; color: #555; border-top: none; background: #fafafa; }
        .table td { font-size: 13px; vertical-align: middle; }
        .badge { font-size: 12px; padding: 4px 10px; border-radius: 12px; }
    </style>
</head>
<body>
<div class="page-container">
    <!-- 搜索栏 -->
    <div class="search-bar">
        <div class="form-inline">
            <input type="text" id="searchUserName" placeholder="用户名称" style="width:150px;">
            <input type="text" id="searchPhone" placeholder="手机号码" style="width:150px;">
            <select id="searchStatus" style="width:120px;">
                <option value="">用户状态</option>
                <option value="0">正常</option>
                <option value="1">停用</option>
            </select>
            <button class="btn btn-primary" onclick="search()"><span class="mdi mdi-magnify"></span> 搜索</button>
            <button class="btn btn-outline-secondary" onclick="resetSearch()"><span class="mdi mdi-refresh"></span> 重置</button>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <button class="btn btn-primary" onclick="openAdd()"><span class="mdi mdi-plus"></span> 新增</button>
        <button class="btn btn-danger" onclick="batchDelete()" style="margin-left:6px;"><span class="mdi mdi-delete"></span> 删除</button>
    </div>

    <!-- 表格 -->
    <div class="table-container">
        <table class="table table-hover" id="dataTable">
            <thead>
                <tr>
                    <th width="40"><input type="checkbox" id="checkAll"></th>
                    <th>用户编号</th>
                    <th>用户名称</th>
                    <th>用户昵称</th>
                    <th>部门</th>
                    <th>手机号码</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th width="180">操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- 新增/编辑弹窗 -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增用户</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>用户名称</label>
                    <input type="text" class="form-control" id="editUserName" placeholder="登录账号">
                </div>
                <div class="form-group">
                    <label>用户昵称</label>
                    <input type="text" class="form-control" id="editNickName" placeholder="显示名称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" class="form-control" id="editPassword" placeholder="留空则不修改">
                </div>
                <div class="form-group">
                    <label>手机号码</label>
                    <input type="text" class="form-control" id="editPhone" placeholder="手机号">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" class="form-control" id="editEmail" placeholder="邮箱地址">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select class="form-control" id="editSex">
                        <option value="0">男</option>
                        <option value="1">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select class="form-control" id="editStatus">
                        <option value="0">正常</option>
                        <option value="1">停用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea class="form-control" id="editRemark" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script>
    var token = parent.localStorage.getItem('token') || localStorage.getItem('token');

    function getHeaders() {
        return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    $(function() {
        loadData();
        $('#checkAll').change(function() {
            $('.row-checkbox').prop('checked', $(this).prop('checked'));
        });
    });

    function search() { loadData(); }
    function resetSearch() {
        $('#searchUserName, #searchPhone').val('');
        $('#searchStatus').val('');
        loadData();
    }

    function loadData() {
        $.ajax({
            url: '/system/user/list',
            type: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            data: {
                userName: $('#searchUserName').val(),
                phoneNumber: $('#searchPhone').val(),
                status: $('#searchStatus').val()
            },
            success: function(res) {
                var rows = res.rows || [];
                var tbody = '';
                rows.forEach(function(u) {
                    tbody += '<tr>';
                    tbody += '<td><input type="checkbox" class="row-checkbox" value="' + u.userId + '"></td>';
                    tbody += '<td>' + (u.userId || '') + '</td>';
                    tbody += '<td>' + (u.userName || '') + '</td>';
                    tbody += '<td>' + (u.nickName || '') + '</td>';
                    tbody += '<td>' + (u.deptName || '') + '</td>';
                    tbody += '<td>' + (u.phoneNumber || '') + '</td>';
                    tbody += '<td><span class="badge ' + (u.status == '0' ? 'badge-success' : 'badge-danger') + '">' + (u.status == '0' ? '正常' : '停用') + '</span></td>';
                    tbody += '<td>' + (u.createTime || '') + '</td>';
                    tbody += '<td>';
                    tbody += '<button class="btn btn-sm btn-warning" onclick="openEdit(' + u.userId + ')"><span class="mdi mdi-pencil"></span></button> ';
                    tbody += '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + u.userId + ')"><span class="mdi mdi-delete"></span></button> ';
                    tbody += '<button class="btn btn-sm btn-outline-info" onclick="resetPwd(' + u.userId + ')"><span class="mdi mdi-lock-reset"></span></button>';
                    tbody += '</td></tr>';
                });
                $('#dataTable tbody').html(tbody);
            }
        });
    }

    function openAdd() {
        $('#editUserId').val('');
        $('#editUserName').val('');
        $('#editNickName').val('');
        $('#editPassword').val('');
        $('#editPhone').val('');
        $('#editEmail').val('');
        $('#editRemark').val('');
        $('#modalTitle').text('新增用户');
        $('#userModal').modal('show');
    }

    function openEdit(userId) {
        $.ajax({
            url: '/system/user/' + userId,
            type: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                var u = res.data;
                $('#editUserId').val(u.userId);
                $('#editUserName').val(u.userName).prop('disabled', true);
                $('#editNickName').val(u.nickName);
                $('#editPassword').val('');
                $('#editPhone').val(u.phoneNumber);
                $('#editEmail').val(u.email);
                $('#editSex').val(u.sex);
                $('#editStatus').val(u.status);
                $('#editRemark').val(u.remark);
                $('#modalTitle').text('编辑用户');
                $('#userModal').modal('show');
            }
        });
    }

    function saveUser() {
        var data = {
            userId: $('#editUserId').val(),
            userName: $('#editUserName').val(),
            nickName: $('#editNickName').val(),
            phoneNumber: $('#editPhone').val(),
            email: $('#editEmail').val(),
            sex: $('#editSex').val(),
            status: $('#editStatus').val(),
            remark: $('#editRemark').val()
        };
        if ($('#editPassword').val()) {
            data.password = $('#editPassword').val();
        }

        var method = data.userId ? 'PUT' : 'POST';
        var url = '/system/user';

        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            headers: { 'Authorization': 'Bearer ' + token },
            data: JSON.stringify(data),
            success: function(res) {
                if (res.code === 200) {
                    $('#userModal').modal('hide');
                    loadData();
                    alert('操作成功');
                } else {
                    alert(res.msg);
                }
            }
        });
    }

    function deleteUser(userId) {
        if (!confirm('确认删除该用户？')) return;
        $.ajax({
            url: '/system/user/' + userId,
            type: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                if (res.code === 200) loadData(); else alert(res.msg);
            }
        });
    }

    function batchDelete() {
        var ids = [];
        $('.row-checkbox:checked').each(function() { ids.push($(this).val()); });
        if (ids.length === 0) { alert('请选择要删除的用户'); return; }
        if (!confirm('确认删除所选用户？')) return;
        $.ajax({
            url: '/system/user/' + ids.join(','),
            type: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                if (res.code === 200) loadData(); else alert(res.msg);
            }
        });
    }

    function resetPwd(userId) {
        var pwd = prompt('请输入新密码：');
        if (!pwd) return;
        $.ajax({
            url: '/system/user/resetPwd',
            type: 'PUT',
            contentType: 'application/json',
            headers: { 'Authorization': 'Bearer ' + token },
            data: JSON.stringify({ userId: userId, password: pwd }),
            success: function(res) {
                alert(res.code === 200 ? '密码重置成功' : res.msg);
            }
        });
    }
</script>
</body>
</html>
