<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>在线用户</title>
<link href="/static/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/lib/mdi/css/materialdesignicons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:15px}
.section{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:15px}
.section-header{padding:12px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.section-body{padding:15px}
.btn{border-radius:4px;font-size:13px;padding:7px 16px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.btn-warning{background:#fee140;border-color:#fee140;color:#333}.btn-danger{background:#fa709a;border-color:#fa709a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.table{margin:0}.table th{font-size:13px;color:#555;border-top:none;background:#fafafa}.table td{font-size:13px;vertical-align:middle}
</style>
</head>
<body>
<div class="section">
  <div class="section-header"><strong>在线用户</strong></div>
  <div class="section-body">
    <table class="table table-hover">
      <thead><tr>
        <th>会话编号</th><th>用户名称</th><th>登录地址</th><th>登录时间</th><th width="100">操作</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="/static/lib/jquery/jquery.min.js"></script>
<script src="/static/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
var token = parent.localStorage.getItem('token') || localStorage.getItem('token');
$(function(){loadData()});

function loadData(){
  $.ajax({url:'/monitor/online/list',type:'GET',headers:{'Authorization':'Bearer '+token},success:function(res){
    if(res.code!==200&&res.code!==0)return;
    var rows=res.data||res.rows||[], t='';
    rows.forEach(function(d){
      t+='<tr><td>'+(d.tokenId||'')+'</td><td>'+(d.userName||'')+'</td>';
      t+='<td>'+(d.ipaddr||'')+'</td><td>'+(d.loginTime||'')+'</td>';
      t+='<td><button class="btn btn-sm btn-danger" onclick="forceLogout(\''+(d.tokenId||'')+'\')"><span class="mdi mdi-logout"></span> 强退</button></td></tr>';
    });
    $('table tbody').html(t || '<tr><td colspan="5" class="text-center">暂无在线用户</td></tr>');
  },error:function(xhr){alert('请求失败: '+(xhr.responseJSON?xhr.responseJSON.msg:xhr.statusText))}});
}

function forceLogout(tokenHash){
  if(!confirm('确认强制下线该用户？'))return;
  $.ajax({url:'/monitor/online/'+tokenHash,type:'DELETE',headers:{'Authorization':'Bearer '+token},
    success:function(res){if(res.code===200||res.code===0)loadData();else alert(res.msg)},
    error:function(xhr){alert('操作失败: '+(xhr.responseJSON?xhr.responseJSON.msg:xhr.statusText))}});
}
</script>
</body>
</html>
