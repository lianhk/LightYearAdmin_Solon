<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>个人信息</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/5.9.55/css/materialdesignicons.min.css" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:20px}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px}
.card-header{padding:15px 20px;border-bottom:1px solid #f0f0f0;font-weight:600;font-size:15px}
.card-body{padding:20px}
.row{display:flex;gap:20px;flex-wrap:wrap}
.col-left{flex:1;min-width:280px}
.col-right{flex:2;min-width:400px}
.avatar-section{text-align:center;padding:30px}
.avatar-circle{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#4facfe,#00f2fe);line-height:100px;font-size:40px;color:#fff;margin:0 auto 15px}
.btn{border-radius:4px;font-size:13px;padding:7px 16px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.form-group{margin-bottom:15px}.form-group label{font-weight:600;font-size:13px;color:#555;margin-bottom:4px}
.form-control{height:38px;border-radius:4px;font-size:13px}
.alert{font-size:13px;display:none}
</style></head><body>
<div class="row">
  <div class="col-left">
    <div class="card"><div class="card-body avatar-section">
      <div class="avatar-circle" id="avatarLetter">A</div>
      <h5 id="profileName">管理员</h5>
      <p class="text-muted" id="profileRole">超级管理员</p>
    </div></div>
  </div>
  <div class="col-right">
    <div class="card"><div class="card-header">基本信息</div><div class="card-body">
      <div class="alert alert-success" id="successMsg">保存成功</div>
      <div class="alert alert-danger" id="errorMsg"></div>
      <div class="form-group"><label>用户名称</label><input class="form-control" id="nickName"></div>
      <div class="form-group"><label>手机号码</label><input class="form-control" id="phoneNumber"></div>
      <div class="form-group"><label>邮箱</label><input class="form-control" id="email"></div>
      <div class="form-group"><label>性别</label><select class="form-control" id="sex"><option value="0">男</option><option value="1">女</option></select></div>
      <button class="btn btn-primary" onclick="updateProfile()">保存</button>
    </div></div>
    <div class="card"><div class="card-header">修改密码</div><div class="card-body">
      <div class="alert alert-success" id="pwdSuccessMsg">密码修改成功</div>
      <div class="alert alert-danger" id="pwdErrorMsg"></div>
      <div class="form-group"><label>旧密码</label><input class="form-control" type="password" id="oldPassword"></div>
      <div class="form-group"><label>新密码</label><input class="form-control" type="password" id="newPassword"></div>
      <div class="form-group"><label>确认密码</label><input class="form-control" type="password" id="confirmPassword"></div>
      <button class="btn btn-primary" onclick="updatePwd()">修改密码</button>
    </div></div>
  </div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
var token = parent.localStorage.getItem('token') || localStorage.getItem('token');
function H(){return {'Authorization':'Bearer '+token,'Content-Type':'application/json'}}
$(function(){
  $.ajax({url:'/system/user/profile',type:'GET',headers:{'Authorization':'Bearer '+token},success:function(res){
    if(res.code===200){var u=res.data;$('#profileName').text(u.nickName||u.userName);$('#avatarLetter').text((u.nickName||u.userName).charAt(0));
      $('#nickName').val(u.nickName);$('#phoneNumber').val(u.phoneNumber);$('#email').val(u.email);$('#sex').val(u.sex)}
  }});
});
function updateProfile(){
  $.ajax({url:'/system/user/profile',type:'PUT',contentType:'application/json',headers:H(),data:JSON.stringify({
    nickName:$('#nickName').val(),phoneNumber:$('#phoneNumber').val(),email:$('#email').val(),sex:$('#sex').val()
  }),success:function(res){if(res.code===200){$('#successMsg').show();$('#errorMsg').hide()}else{$('#errorMsg').text(res.msg).show()}}});
}
function updatePwd(){
  $('#pwdSuccessMsg,#pwdErrorMsg').hide();
  var op=$('#oldPassword').val(),np=$('#newPassword').val(),cp=$('#confirmPassword').val();
  if(!op||!np){$('#pwdErrorMsg').text('请填写密码').show();return}
  if(np!==cp){$('#pwdErrorMsg').text('两次密码不一致').show();return}
  $.ajax({url:'/system/user/profile/updatePwd',type:'PUT',contentType:'application/json',headers:H(),
    data:JSON.stringify({oldPassword:op,newPassword:np}),
    success:function(res){if(res.code===200){$('#pwdSuccessMsg').show();$('#oldPassword,#newPassword,#confirmPassword').val('')}else $('#pwdErrorMsg').text(res.msg).show()}});
}
</script></body></html>
