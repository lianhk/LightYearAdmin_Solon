<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>操作日志</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/MaterialDesign-Webfont/5.9.55/css/materialdesignicons.min.css" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:"Microsoft YaHei",sans-serif;padding:15px}
.section{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:15px}
.section-header{padding:12px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.section-body{padding:15px}.btn{border-radius:4px;font-size:13px;padding:7px 16px}.btn-primary{background:#4facfe;border-color:#4facfe;color:#fff}
.btn-danger{background:#fa709a;border-color:#fa709a;color:#fff}.btn-sm{padding:4px 10px;font-size:12px}
.table{margin:0}.table th{font-size:13px;color:#555;border-top:none;background:#fafafa}.table td{font-size:13px;vertical-align:middle}
.badge{font-size:12px;padding:4px 10px;border-radius:12px}
.form-inline{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.form-control{height:38px;border-radius:4px;font-size:13px}
</style></head><body>
<div class="section"><div class="section-header"><strong>操作日志</strong>
  <div><button class="btn btn-danger btn-sm" onclick="cleanLog()"><span class="mdi mdi-delete-empty"></span> 清空</button></div>
</div><div class="section-body">
  <div class="form-inline"><input class="form-control" id="searchTitle" placeholder="模块标题" style="width:150px">
    <input class="form-control" id="searchOperName" placeholder="操作人员" style="width:150px">
    <select class="form-control" id="searchStatus" style="width:120px"><option value="">状态</option><option value="0">成功</option><option value="1">失败</option></select>
    <button class="btn btn-primary" onclick="search()"><span class="mdi mdi-magnify"></span></button>
  </div><hr>
  <table class="table table-hover"><thead><tr><th>编号</th><th>模块</th><th>类型</th><th>操作人</th><th>IP</th><th>状态</th><th>耗时(ms)</th><th>时间</th></tr></thead><tbody></tbody></table>
</div></div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
var token = parent.localStorage.getItem('token') || localStorage.getItem('token');
$(function(){loadData()});function search(){loadData()}
function loadData(){
  $.ajax({url:'/monitor/operlog/list',type:'GET',headers:{'Authorization':'Bearer '+token},
    data:{title:$('#searchTitle').val(),operName:$('#searchOperName').val(),status:$('#searchStatus').val()},
    success:function(res){
      var t='';(res.rows||[]).forEach(function(l){
        t+='<tr><td>'+l.operId+'</td><td>'+l.title+'</td><td>'+(l.businessType||'')+'</td><td>'+l.operName+'</td>';
        t+='<td>'+l.operIp+'</td><td><span class="badge '+(l.status==0?'badge-success':'badge-danger')+'">'+(l.status==0?'成功':'失败')+'</span></td>';
        t+='<td>'+l.costTime+'</td><td>'+l.operTime+'</td></tr>';
      });$('table tbody').html(t);
    }
  });
}
function cleanLog(){if(!confirm('确认清空所有操作日志？'))return;
  $.ajax({url:'/monitor/operlog/clean',type:'DELETE',headers:{'Authorization':'Bearer '+token},success:function(r){if(r.code===200)loadData()}});
}
</script></body></html>
